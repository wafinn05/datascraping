name: Daily Stock Scraping & Feature Engineering

on:
  schedule:
    # Berjalan setiap hari pada 11:00 UTC (18:00 WIB / 6 Sore WIB)
    - cron: '0 11 * * *'
  workflow_dispatch: # Memungkinkan eksekusi manual dari tab Actions di GitHub

jobs:
  scrape_and_process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance feedparser libsql-client numpy torch transformers python-dotenv

      - name: Run Scraping and Feature Engineering
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python run_all.py
